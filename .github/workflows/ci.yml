name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  checks:
    name: Minimal Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: CI sanity check
        run: echo "CI checks intentionally minimal for now"
