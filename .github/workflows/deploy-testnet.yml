name: Deploy to Testnet

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  skipped:
    name: Deployment Skipped
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "## Deployment Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "Automatic deployments are disabled on push." >> "$GITHUB_STEP_SUMMARY"
